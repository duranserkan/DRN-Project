name: Nuget Publish All
description: "Packs and publishes all DRN.Framework NuGet packages."
inputs:
  version:
    description: "Package version extracted from the release tag."
    required: true
  package-source-url:
    description: "NuGet package source URL used for package push."
    required: true
  nuget-token:
    description: "NuGet package source API token used only for package push steps."
    required: true
runs:
  using: "composite"
  steps:
    - name: Publish SharedKernel
      uses: ./.github/actions/nuget-publish
      with:
        project-name: DRN.Framework.SharedKernel
        version: ${{ inputs.version }}
        package-source-url: ${{ inputs.package-source-url }}
        nuget-token: ${{ inputs.nuget-token }}
    - name: Publish Utils
      uses: ./.github/actions/nuget-publish
      with:
        project-name: DRN.Framework.Utils
        version: ${{ inputs.version }}
        package-source-url: ${{ inputs.package-source-url }}
        nuget-token: ${{ inputs.nuget-token }}
    - name: Publish EntityFramework
      uses: ./.github/actions/nuget-publish
      with:
        project-name: DRN.Framework.EntityFramework
        version: ${{ inputs.version }}
        package-source-url: ${{ inputs.package-source-url }}
        nuget-token: ${{ inputs.nuget-token }}
    - name: Publish Hosting
      uses: ./.github/actions/nuget-publish
      with:
        project-name: DRN.Framework.Hosting
        version: ${{ inputs.version }}
        package-source-url: ${{ inputs.package-source-url }}
        nuget-token: ${{ inputs.nuget-token }}
    - name: Publish Testing
      uses: ./.github/actions/nuget-publish
      with:
        project-name: DRN.Framework.Testing
        version: ${{ inputs.version }}
        package-source-url: ${{ inputs.package-source-url }}
        nuget-token: ${{ inputs.nuget-token }}
