name: Dotnet Sonar Scan
description: "Set up .NET, run SonarCloud analysis, build, and collect test coverage."
inputs:
  working-directory:
    description: "Repository directory containing the solution file."
    required: false
    default: "."
  solution-file:
    description: "Solution file to build during SonarCloud analysis."
    required: true
  configuration:
    description: "Build and test configuration used during SonarCloud analysis."
    required: false
    default: Debug
  version:
    description: "Optional package/application version to pass to MSBuild."
    required: false
    default: ""
  sonar-token:
    description: "SonarCloud token."
    required: true
  sonar-project-key:
    description: "SonarCloud project key."
    required: false
    default: "duranserkan_DRN-Project"
  sonar-host-url:
    description: "SonarCloud host URL."
    required: false
    default: "https://sonarcloud.io"
  sonar-organization:
    description: "SonarCloud organization."
    required: false
    default: "duranserkan"
  sonar-branch-name:
    description: "Optional SonarCloud branch name to attach analysis to when the workflow runs from a tag ref."
    required: false
    default: ""
  sonar-branch-target:
    description: "Optional SonarCloud target branch for non-main branch analysis."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Setup SDK
      uses: ./.github/actions/setup-sdk-and-tools

    - name: Sonar Scan Begin
      uses: ./.github/actions/sonar-begin
      with:
        working-directory: ${{ inputs.working-directory }}
        sonar-token: ${{ inputs.sonar-token }}
        sonar-project-key: ${{ inputs.sonar-project-key }}
        sonar-host-url: ${{ inputs.sonar-host-url }}
        sonar-organization: ${{ inputs.sonar-organization }}
        sonar-branch-name: ${{ inputs.sonar-branch-name }}
        sonar-branch-target: ${{ inputs.sonar-branch-target }}

    - name: Build
      uses: ./.github/actions/dotnet-build
      with:
        working-directory: ${{ inputs.working-directory }}
        solution-file: ${{ inputs.solution-file }}
        configuration: ${{ inputs.configuration }}
        version: ${{ inputs.version }}

    - name: Test with Coverage
      uses: ./.github/actions/dotnet-test-coverage
      with:
        working-directory: ${{ inputs.working-directory }}
        configuration: ${{ inputs.configuration }}

    - name: Sonar Scan End
      uses: ./.github/actions/sonar-end
      with:
        working-directory: ${{ inputs.working-directory }}
        sonar-token: ${{ inputs.sonar-token }}
