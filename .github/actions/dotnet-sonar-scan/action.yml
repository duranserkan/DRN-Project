name: Dotnet Sonar Scan
description: "Set up .NET, run SonarCloud analysis, build, and collect test coverage."
inputs:
  working-directory:
    description: "Repository directory containing DRN.slnx."
    required: false
    default: "."
runs:
  using: "composite"
  steps:
    - name: Setup SDK
      uses: ./.github/actions/setup-sdk-and-tools

    - name: Sonar Scan Begin
      uses: ./.github/actions/sonar-begin
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Build
      uses: ./.github/actions/dotnet-build
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Test with Coverage
      uses: ./.github/actions/dotnet-test-coverage
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Sonar Scan End
      uses: ./.github/actions/sonar-end
      with:
        working-directory: ${{ inputs.working-directory }}
