name: Scan Vulnerabilities
description: "Scan NuGet packages for vulnerabilities."
inputs:
  working-directory:
    description: "Repository directory containing DRN.slnx."
    required: false
    default: "."
runs:
  using: "composite"
  steps:
    - name: Scan vulnerabilities
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        # dotnet list package does not support docker-compose.dcproj. Scan a
        # temporary solution copy so CI never mutates the tracked DRN.slnx.
        temp_solution="$(mktemp -p . DRN.package-scan.XXXXXX)"
        scan_solution="${temp_solution}.slnx"
        cleanup() {
          rm -f "$temp_solution" "$scan_solution"
        }
        trap cleanup EXIT

        cp DRN.slnx "$scan_solution"
        dotnet sln "$scan_solution" remove docker-compose.dcproj || true

        status=0
        packages=$(dotnet list "$scan_solution" package --include-transitive --vulnerable) || status=$?
        if [ "$status" -ne 0 ]; then
          echo "$packages"
          exit "$status"
        fi
        if [[ "$packages" == *"has the following vulnerable packages"* ]]; then
          echo "$packages"
          exit 1
        fi
