name: Dotnet Build
description: "Restore dependencies, scan NuGet vulnerabilities, and build solution in the selected configuration."
inputs:
  working-directory:
    description: "Repository directory containing DRN.slnx."
    required: false
    default: "."
  configuration:
    description: "Build configuration."
    required: false
    default: Debug
  version:
    description: "Optional package/application version to pass to MSBuild."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Restore dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet restore DRN.slnx
    - name: Scan vulnerabilities
      uses: ./.github/actions/scan-nuget-vulnerabilities
      with:
        working-directory: ${{ inputs.working-directory }}
    - name: Build solution
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BUILD_CONFIGURATION: ${{ inputs.configuration }}
        BUILD_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        build_args=(
          dotnet build DRN.slnx
          --no-restore
          --no-incremental
          --configuration "$BUILD_CONFIGURATION"
          -p:ContinuousIntegrationBuild=true
        )

        if [ -n "$BUILD_VERSION" ]; then
          build_args+=(-p:Version="$BUILD_VERSION")
        fi

        "${build_args[@]}"
