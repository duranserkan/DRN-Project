name: Dotnet Build
description: "Restore dependencies, scan NuGet vulnerabilities, and build solution in the selected configuration."
inputs:
  working-directory:
    description: "Repository directory containing the solution file."
    required: false
    default: "."
  solution-file:
    description: "Solution file to restore, scan, and build."
    required: true
  configuration:
    description: "Build configuration."
    required: false
    default: Debug
  version:
    description: "Optional package/application version to pass to MSBuild."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Restore dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SOLUTION_FILE: ${{ inputs.solution-file }}
      run: dotnet restore "$SOLUTION_FILE"
    - name: Scan vulnerabilities
      uses: ./.github/actions/scan-nuget-vulnerabilities
      with:
        working-directory: ${{ inputs.working-directory }}
        solution-file: ${{ inputs.solution-file }}
    - name: Build solution
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SOLUTION_FILE: ${{ inputs.solution-file }}
        BUILD_CONFIGURATION: ${{ inputs.configuration }}
        BUILD_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        build_args=(
          dotnet build "$SOLUTION_FILE"
          --no-restore
          --no-incremental
          --configuration "$BUILD_CONFIGURATION"
          -p:ContinuousIntegrationBuild=true
        )

        # Only release workflows pass a version. Avoid sending an empty
        # -p:Version value during PR/branch CI, and keep each argument quoted
        # separately instead of building one shell-interpreted command string.
        if [ -n "$BUILD_VERSION" ]; then
          build_args+=(-p:Version="$BUILD_VERSION")
        fi

        "${build_args[@]}"
