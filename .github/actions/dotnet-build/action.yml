name: Dotnet Build
description: "Restore dependencies, scan NuGet vulnerabilities, and build solution in Debug mode."
runs:
  using: "composite"
  steps:
    - name: Restore dependencies
      shell: bash
      run: dotnet restore DRN.slnx
    - name: Scan vulnerabilities
      uses: ./.github/actions/scan-nuget-vulnerabilities
    - name: Build solution
      shell: bash
      run: dotnet build DRN.slnx --no-restore --no-incremental -p:ContinuousIntegrationBuild=true