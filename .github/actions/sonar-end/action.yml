name: Sonar End
description: "End the SonarCloud scan and upload results."
inputs:
  working-directory:
    description: "Repository directory that contains the active Sonar analysis."
    required: false
    default: "."
runs:
  using: "composite"
  steps:
    - name: Sonar Scan End
      shell: pwsh
      working-directory: ${{ inputs.working-directory }}
      run: |
        ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
