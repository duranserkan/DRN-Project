name: Sonar Begin
description: "Initialize SonarCloud scanning session."
inputs:
  working-directory:
    description: "Repository directory to analyze."
    required: false
    default: "."
  sonar-token:
    description: "SonarCloud token."
    required: true
  sonar-project-key:
    description: "SonarCloud project key."
    required: false
    default: "duranserkan_DRN-Project"
  sonar-host-url:
    description: "SonarCloud host URL."
    required: false
    default: "https://sonarcloud.io"
  sonar-organization:
    description: "SonarCloud organization."
    required: false
    default: "duranserkan"
  version:
    description: "Optional project version to attach to the SonarCloud analysis."
    required: false
    default: ""
  sonar-branch-name:
    description: "Optional SonarCloud branch name to attach analysis to when the workflow runs from a tag ref."
    required: false
    default: ""
  sonar-branch-target:
    description: "Optional SonarCloud target branch for non-main branch analysis."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up Sonar tools
      uses: ./.github/actions/sonar-tools
      with:
        working-directory: ${{ inputs.working-directory }}
    - name: Sonar Scan Begin # Sonar Begin
      shell: pwsh
      working-directory: ${{ inputs.working-directory }}
      env:
        SONAR_PROJECT_KEY: ${{ inputs.sonar-project-key }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
        SONAR_ORGANIZATION: ${{ inputs.sonar-organization }}
        SONAR_PROJECT_VERSION: ${{ inputs.version }}
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_BRANCH_NAME: ${{ inputs.sonar-branch-name }}
        SONAR_BRANCH_TARGET: ${{ inputs.sonar-branch-target }}
      run: |
        $ErrorActionPreference = "Stop"
        $PSNativeCommandUseErrorActionPreference = $true

        $scannerArgs = @(
          "begin",
          "/k:$env:SONAR_PROJECT_KEY",
          "/o:$env:SONAR_ORGANIZATION",
          "/d:sonar.token=$env:SONAR_TOKEN",
          "/d:sonar.cs.vscoveragexml.reportsPaths=coverage-unit.xml,coverage-integration.xml",
          "/d:sonar.host.url=$env:SONAR_HOST_URL",
          "/d:sonar.qualitygate.wait=true",
          "/d:sonar.qualitygate.timeout=600"
        )

        if (-not [string]::IsNullOrWhiteSpace($env:SONAR_PROJECT_VERSION)) {
          $scannerArgs += "/v:$env:SONAR_PROJECT_VERSION"
        }

        if (-not [string]::IsNullOrWhiteSpace($env:SONAR_BRANCH_NAME)) {
          $scannerArgs += "/d:sonar.branch.name=$env:SONAR_BRANCH_NAME"
        }

        if (-not [string]::IsNullOrWhiteSpace($env:SONAR_BRANCH_TARGET)) {
          $scannerArgs += "/d:sonar.branch.target=$env:SONAR_BRANCH_TARGET"
        }

        ./.sonar/scanner/dotnet-sonarscanner @scannerArgs
