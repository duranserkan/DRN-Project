name: CodeQL Scan
description: "Set up CodeQL, build the repository, and upload SARIF results."
inputs:
  working-directory:
    description: "Repository directory containing DRN.slnx."
    required: false
    default: "."
  source-root:
    description: "Repository source root passed to CodeQL init."
    required: true
  checkout-path:
    description: "Absolute checkout path passed to CodeQL analyze."
    required: true
  languages:
    description: "Comma-separated CodeQL languages."
    required: false
    default: "csharp,javascript"
runs:
  using: "composite"
  steps:
    - name: Setup SDK
      uses: ./.github/actions/setup-sdk-and-tools

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        languages: ${{ inputs.languages }}
        source-root: ${{ inputs.source-root }}

    - name: Build for CodeQL
      uses: ./.github/actions/dotnet-build
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        output: sarif-results
        checkout_path: ${{ inputs.checkout-path }}
