# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
# Fast protected-branch CI for develop.
name: develop

on:
  push:
    branches: [ "develop" ]

concurrency:
  group: develop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build frontend
        uses: ./.github/actions/frontend-build

  backend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      SOLUTION_FILE: DRN.slnx
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run backend validation
        uses: ./.github/actions/dotnet-validate
        with:
          solution-file: ${{ env.SOLUTION_FILE }}

  gatekeeper:
    permissions: {}
    runs-on: ubuntu-latest
    if: ${{ always() }}
    # Keep this aggregate gate in sync with every required validation job.
    # Add new jobs to both `needs` and the result check below.
    needs:
      - frontend
      - backend
    steps:
      - name: Verify required jobs completed successfully
        env:
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
        run: |
          if [ "$FRONTEND_RESULT" != "success" ] || [ "$BACKEND_RESULT" != "success" ]; then
            echo "One or more required checks failed."
            echo "frontend: $FRONTEND_RESULT"
            echo "backend: $BACKEND_RESULT"
            exit 1
          fi
          echo "Required jobs passed successfully."
