# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: develop

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
jobs:
  frontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build frontend
        uses: ./.github/actions/frontend-build

  backend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup SDK
        uses: ./.github/actions/setup-sdk-and-tools

      - name: Build
        uses: ./.github/actions/dotnet-build

      - name: Test
        uses: ./.github/actions/dotnet-test

  build:
    permissions: {}
    runs-on: ubuntu-latest
    if: ${{ always() }}
    # Keep this aggregate gate in sync with every required validation job.
    # Add new jobs to both `needs` and the result check below.
    needs:
      - frontend
      - backend
    steps:
      - name: Verify frontend and backend completed successfully
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs.backend.result }}" != "success" ]; then
            echo "One or more required checks failed."
            echo "frontend: ${{ needs.frontend.result }}"
            echo "backend: ${{ needs.backend.result }}"
            exit 1
          fi
          echo "Frontend and backend checks passed successfully!"
