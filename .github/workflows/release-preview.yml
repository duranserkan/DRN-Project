# this pipeline developed with the help of https://github.com/acraven/blog-nuget-workflow-github-actions/
name: release-preview

on:
  push:
    tags:
      - release/v[0-9]+.[0-9]+.[0-9]+-preview[0-9][0-9][0-9]

concurrency:
  group: release-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Docker image validation intentionally accepts lowercase registry hosts and namespace paths only.
      DOCKER_REGISTRY: docker.io
      DOCKER_IMAGE_REPOSITORY_PREFIX: duranserkan
      SOLUTION_FILE: DRN.slnx
      # NuGet source validation intentionally requires the canonical lowercase https:// scheme.
      NUGET_PACKAGE_SOURCE_URL: https://api.nuget.org/v3/index.json
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag commit is origin/develop HEAD
        uses: ./.github/actions/verify-release-tag-head
        with:
          source-branch: develop
          release-channel: preview

      - name: Set version from tag
        id: version
        uses: ./.github/actions/release-version-from-tag
        with:
          release-channel: preview

      - name: Setup SDK
        uses: ./.github/actions/setup-sdk-and-tools

      - name: Build frontend
        uses: ./.github/actions/frontend-build

      - name: Run Sonar preview gate
        uses: ./.github/actions/dotnet-sonar-scan
        with:
          solution-file: ${{ env.SOLUTION_FILE }}
          configuration: Release
          version: ${{ steps.version.outputs.version }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-branch-name: develop
          sonar-branch-target: master

      - name: Run CodeQL scan
        uses: ./.github/actions/codeql-scan
        with:
          solution-file: ${{ env.SOLUTION_FILE }}
          source-root: .
          checkout-path: ${{ github.workspace }}
          configuration: Release
          version: ${{ steps.version.outputs.version }}

      # GitHub code scanning merge protection replaces the custom SARIF verifier.
      # Usage: protect the source branch in Settings -> Rules -> Rulesets,
      # enable "Require code scanning results", add CodeQL, then choose thresholds.
      # https://docs.github.com/en/code-security/how-tos/find-and-fix-code-vulnerabilities/manage-your-configuration/set-merge-protection

      - name: Stage and scan Docker images
        id: docker-images
        uses: ./.github/actions/docker-stage-scan-all
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          image-repository-prefix: ${{ env.DOCKER_IMAGE_REPOSITORY_PREFIX }}
          version: ${{ steps.version.outputs.version }}

      - name: Publish Packages
        uses: ./.github/actions/nuget-publish-all
        with:
          version: ${{ steps.version.outputs.version }}
          package-source-url: ${{ env.NUGET_PACKAGE_SOURCE_URL }}
          nuget-token: ${{ secrets.NUGET_TOKEN }}

      - name: Generate artifact attestation #https://andrewlock.net/creating-provenance-attestations-for-nuget-packages-in-github-actions/
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "artifacts/packages/*.nupkg"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: artifacts/packages

      - name: Promote Docker image tags
        uses: ./.github/actions/docker-promote-all
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          image-repository-prefix: ${{ env.DOCKER_IMAGE_REPOSITORY_PREFIX }}
          version: ${{ steps.version.outputs.version }}
          sample-image-digest: ${{ steps.docker-images.outputs.sample-image-digest }}
          nexus-image-digest: ${{ steps.docker-images.outputs.nexus-image-digest }}
