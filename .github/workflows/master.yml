# Protected-branch and scheduled CI for master. Token-bearing analysis stays
# here, away from pull request jobs that execute PR-controlled code.
name: master

on:
  push:
    branches: [ "master" ]
  schedule:
      - cron: '29 13 * * 0' # Every Sunday at 13:29 UTC

concurrency:
  group: master-ci
  cancel-in-progress: true

jobs:
  frontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build frontend
        uses: ./.github/actions/frontend-build

  backend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run backend Sonar scan
        uses: ./.github/actions/dotnet-sonar-scan
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}

  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run CodeQL scan
        uses: ./.github/actions/codeql-scan
        with:
          source-root: .
          checkout-path: ${{ github.workspace }}

      # GitHub code scanning merge protection replaces the custom SARIF verifier.
      # Usage: protect the source branch in Settings -> Rules -> Rulesets,
      # enable "Require code scanning results", add CodeQL, then choose thresholds.
      # https://docs.github.com/en/code-security/how-tos/find-and-fix-code-vulnerabilities/manage-your-configuration/set-merge-protection

  gatekeeper:
    permissions: {}
    runs-on: ubuntu-latest
    if: ${{ always() }}
    # Keep this aggregate gate in sync with every required validation job.
    # Add new jobs to both `needs` and the result check below.
    needs:
      - frontend
      - backend
      - codeql
    steps:
      - name: Verify required jobs completed successfully
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.codeql.result }}" != "success" ]; then
            echo "One or more required checks failed."
            echo "frontend: ${{ needs.frontend.result }}"
            echo "backend: ${{ needs.backend.result }}"
            echo "codeql: ${{ needs.codeql.result }}"
            exit 1
          fi
          echo "Required jobs passed successfully."
