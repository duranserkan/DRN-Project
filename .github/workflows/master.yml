# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: master

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
      - cron: '29 13 * * 0' # Every Sunday at 13:29 UTC

jobs:
  frontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build frontend
        uses: ./.github/actions/frontend-build

  build-and-sonar-scan:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: duranserkan_DRN-Project
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_ORGANIZATION: duranserkan
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup SDK
        uses: ./.github/actions/setup-sdk-and-tools

      - name: Sonar Scan Begin
        uses: ./.github/actions/sonar-begin

      - name: Build for Sonar Scan
        uses: ./.github/actions/dotnet-build

      - name: Test Unit
        run: ./.sonar/coverage/dotnet-coverage collect "dotnet run --project DRN.Test.Unit/DRN.Test.Unit.csproj --no-build --verbosity normal" -f xml -o "coverage-unit.xml"

      - name: Test Integration
        run: ./.sonar/coverage/dotnet-coverage collect "dotnet run --project DRN.Test.Integration/DRN.Test.Integration.csproj --no-build --verbosity normal" -f xml -o "coverage-integration.xml"

      - name: Sonar Scan End
        uses: ./.github/actions/sonar-end

  codeql-scan:
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup SDK
        uses: ./.github/actions/setup-sdk-and-tools

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp,javascript

      - name: Build for CodeQL
        uses: ./.github/actions/dotnet-build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          output: sarif-results

      # GitHub code scanning merge protection replaces the custom SARIF verifier.
      # Usage: protect the source branch in Settings -> Rules -> Rulesets,
      # enable "Require code scanning results", add CodeQL, then choose thresholds.
      # https://docs.github.com/en/code-security/how-tos/find-and-fix-code-vulnerabilities/manage-your-configuration/set-merge-protection

  gatekeeper:
    permissions: {}
    runs-on: ubuntu-latest
    if: ${{ always() }}
    # Keep this aggregate gate in sync with every required validation job.
    # Add new jobs to both `needs` and the result check below.
    needs:
      - frontend
      - build-and-sonar-scan
      - codeql-scan
    steps:
      - name: Verify All Scans Completed Successfully
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs['build-and-sonar-scan'].result }}" != "success" ] || [ "${{ needs['codeql-scan'].result }}" != "success" ]; then
            echo "One or more required checks failed."
            echo "frontend: ${{ needs.frontend.result }}"
            echo "build-and-sonar-scan: ${{ needs['build-and-sonar-scan'].result }}"
            echo "codeql-scan: ${{ needs['codeql-scan'].result }}"
            exit 1
          fi
          echo "All scans passed successfully!"
