name: Docker Publish All
description: "Set up Docker Buildx, log in to Docker Hub, and publish all Docker containers."
inputs:
  username:
    description: "Docker Hub username used for authentication."
    required: true
  password:
    description: "Docker Hub password or personal access token (PAT) used for authentication."
    required: true
runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      with:
        platforms: linux/amd64,linux/arm64
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
    - name: Publish Sample
      uses: ./.github/workflows/actions/docker-publish
      with:
        project-name: Sample.Hosted
        image-repository-name: drn-project-sample
    - name: Publish Nexus
      uses: ./.github/workflows/actions/docker-publish
      with:
        project-name: DRN.Nexus.Hosted
        image-repository-name: drn-project-nexus
