name: Frontend Build
description: "Install, audit, and build Sample.Hosted Vite frontend assets."
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.x
        cache: npm
        cache-dependency-path: Sample.Hosted/package-lock.json
    - name: Install npm dependencies
      shell: bash
      working-directory: Sample.Hosted
      run: npm ci
    - name: Audit npm dependencies
      shell: bash
      working-directory: Sample.Hosted
      run: npm audit --audit-level=high
    - name: Build Vite assets
      shell: bash
      working-directory: Sample.Hosted
      run: npm run build
